<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>个人博客</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--nav-bg:rgba(4,4,16,0.78);--nav-fg:rgba(255,255,255,0.85);--nav-muted:rgba(255,255,255,0.42);--nav-hover:rgba(255,255,255,0.10)}
body{width:100vw;height:100vh;overflow:hidden;background:#020208;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none;touch-action:none}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;
  height:54px;padding:0 28px;background:var(--nav-bg);backdrop-filter:blur(16px) saturate(140%);
  -webkit-backdrop-filter:blur(16px) saturate(140%);border-bottom:1px solid rgba(255,255,255,0.05)}
nav .brand{font-size:1.05rem;font-weight:600;color:var(--nav-fg);letter-spacing:0.02em}
nav .links{display:flex;gap:6px;align-items:center}
nav .links a{color:var(--nav-muted);text-decoration:none;font-size:0.88rem;padding:6px 14px;border-radius:7px;transition:color 0.2s,background 0.2s}
nav .links a:hover{color:var(--nav-fg);background:var(--nav-hover)}
#bg{position:fixed;inset:0;width:100%;height:100%;display:block}
.hint{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:60;font-size:0.8rem;
  color:rgba(255,255,255,0.3);pointer-events:none;letter-spacing:0.04em}
.cz{position:fixed;z-index:50;width:22vmin;height:22vmin;cursor:pointer;transition:opacity .5s}
.cz:hover{opacity:1!important}.cz.ly{top:8vh;left:8vw}.cz.cy{bottom:8vh;right:8vw}
.cz.le{top:8vh;right:8vw}.cz.or{bottom:8vh;left:8vw}
.panel{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:80;background:rgba(2,2,12,.65);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .5s;color:#fff;font-size:1.4rem}
.panel.on{opacity:1;pointer-events:auto}
.panel .close{position:absolute;top:24px;right:28px;font-size:2.2rem;cursor:pointer;color:rgba(255,255,255,.35);
  transition:color .2s;background:none;border:none;z-index:5;line-height:1}
.panel .close:hover{color:#fff}
.panel .home-btn{margin-top:2rem;color:rgba(255,255,255,.4);text-decoration:none;font-size:.9rem;
  transition:color .3s;cursor:pointer}
.panel .home-btn:hover{color:#fff}
.pn-home-layout{display:flex;width:80vw;max-width:900px;gap:48px;align-items:center}
.pn-home-layout .left{flex:0 0 200px;text-align:center}
.pn-home-layout .left .avatar{width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.06);
  border:2px solid rgba(255,255,255,.15);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:3rem}
.pn-home-layout .left .status{font-size:.8rem;color:rgba(255,255,255,.35)}
.pn-home-layout .right{flex:1;min-width:0}
.pn-home-layout .right h2{font-size:1.6rem;margin-bottom:8px;font-weight:500}
.pn-home-layout .right .bio{font-size:.9rem;color:rgba(255,255,255,.5);line-height:1.7;margin-bottom:20px}
.pn-home-layout .right .tags{display:flex;flex-wrap:wrap;gap:8px}
.pn-home-layout .right .tags span{font-size:.75rem;padding:4px 12px;border-radius:12px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.5)}
@media(max-width:640px){.pn-home-layout{flex-direction:column;gap:24px;text-align:center}.pn-home-layout .left{flex:0 0 auto}}
@media(max-width:640px){nav{padding:0 14px;height:48px}nav .brand{font-size:0.9rem}nav .links a{font-size:0.78rem;padding:5px 10px}.hint{bottom:18px;font-size:0.7rem}.cz{width:30vmin;height:30vmin}}
</style>

<script>
// Page navigation
(function(){
var current=null;
function show(id){
  if(current===id)return hide();
  if(current)document.getElementById('pn-'+current).classList.remove('on');
  var pn=document.getElementById('pn-'+id);
  if(pn){pn.classList.add('on');current=id;}
}
function hide(){
  if(current){document.getElementById('pn-'+current).classList.remove('on');current=null;}
}
document.querySelectorAll('nav a[data-page], .cz[data-page]').forEach(function(el){
  el.addEventListener('click',function(e){e.preventDefault();show(this.dataset.page);});
});
document.querySelectorAll('.home-btn').forEach(function(el){
  el.addEventListener('click',function(e){e.preventDefault();hide();});
});
document.querySelectorAll('.panel .close').forEach(function(el){
  el.addEventListener('click',function(e){e.stopPropagation();hide();});
});
document.addEventListener('keydown',function(e){if(e.key==='Escape')hide();});
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
<script>
(function(){
if(typeof THREE==='undefined'){document.getElementById('hint').textContent='加载中…';return}
var c=document.getElementById('bg'),h=document.getElementById('hint');
var R=new THREE.WebGLRenderer({canvas:c,antialias:true,alpha:false});
R.setPixelRatio(Math.min(devicePixelRatio,2));R.setSize(innerWidth,innerHeight);
var gl=R.getContext(),_cs=gl.compileShader.bind(gl);
gl.compileShader=function(s){_cs(s);if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){h.textContent='⚠ '+gl.getShaderInfoLog(s).substring(0,120);h.style.color='rgba(255,120,120,0.9)'}};
var S=new THREE.Scene(),K=new THREE.OrthographicCamera(-1,1,1,-1,.1,10);K.position.z=1;
var RE=new THREE.Vector2(innerWidth,innerHeight);
var tc=document.createElement('canvas');tc.width=2048;tc.height=512;
var tx=tc.getContext('2d');tx.font='600 80px "PingFang SC","Microsoft YaHei UI",sans-serif';
tx.textAlign='center';tx.textBaseline='middle';tx.shadowColor='rgba(180,210,255,0.5)';tx.shadowBlur=30;
tx.font='400 20px "PingFang SC","Microsoft YaHei UI",sans-serif';tx.shadowBlur=4;tx.fillStyle='rgba(255,255,255,0.22)';tx.fillText('点击星图或右上角查看各个栏目',1024,300);
tx.font='600 80px "PingFang SC","Microsoft YaHei UI",sans-serif';tx.shadowBlur=30;tx.fillStyle='rgba(255,255,255,0.95)';tx.fillText('欢迎来到我的频道',1024,256);
var te=new THREE.CanvasTexture(tc);te.minFilter=THREE.LinearFilter;te.magFilter=THREE.LinearFilter;

var U={uRes:{value:RE},uTime:{value:0},uBH:{value:new THREE.Vector2(innerWidth*.5,innerHeight*.45)},
  uRadius:{value:0},uTex:{value:te},uMouse:{value:new THREE.Vector2(.5,.5)},uZoom:{value:0}};

// ===== VERTEX SHADER =====
var VS="varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}";

// ===== FRAGMENT SHADER =====
var FS=[
// --- uniforms ---
"varying vec2 vUv;uniform vec2 uRes,uBH,uMouse;uniform float uTime,uRadius,uZoom;uniform sampler2D uTex;",

// --- hash & noise ---
"float h23(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}",
"float h31(vec3 p){return fract(sin(dot(p,vec3(127.1,311.7,74.7)))*43758.5453);}",
"float noise(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);return mix(mix(h23(i),h23(i+vec2(1,0)),f.x),mix(h23(i+vec2(0,1)),h23(i+vec2(1,1)),f.x),f.y);}",
"float fbm(vec2 p){float v=0.,a=.5;vec2 s=p;for(int i=0;i<4;i++){v+=a*noise(s);s*=2.1;a*=.5;}return v;}",

// --- constants ---
"const float PI=3.14159265;const float SQRT3=1.7320508;",

// ============================================================
// BACKGROUND — deep space with subtle nebula
// ============================================================
"vec3 renderBackground(vec2 uv){vec3 col=vec3(0);",
  // Base — very dark, slightly warm center
  "float nd=noise(uv*5.+1.3)*.5+noise(uv*2.8-2.1)*.5;",
  "col+=mix(vec3(.008,.006,.012),vec3(.015,.01,.02),nd);",
  // Three FBM nebula layers — gas, dust, emission
  "float gas=fbm(uv*1.6+vec2(.3,1.1));",
  "float dust=fbm(uv*1.9+vec2(2.1,.5));",
  "float emi=fbm(uv*1.3+vec2(1.5,2.3));",
  "col+=vec3(.012,.004,.003)*gas;",
  "col+=vec3(.004,.008,.01)*dust;",
  "col+=vec3(.006,.003,.014)*emi;",
  "return col;}",

// ============================================================
// STARS — multi-temperature procedural field
// ============================================================
"vec3 renderStars(vec2 uv,float time){vec3 col=vec3(0);",
  "for(int L=0;L<7;L++){float sc=pow(2.1,float(L));vec2 suv=uv*sc*65.;vec2 ce=floor(suv),lo=fract(suv)-.5;",
    "float hh=h23(ce+float(L)*999.),h2=h23(ce+float(L)*777.+413.),h3=h23(ce+float(L)*541.+237.);",
    "float thr=.014+float(L)*.007;",
    "if(hh<thr){float tb=(thr-hh)/thr;",
      "float br=pow(tb,1.5)*(.3+.7*h2);br*=.45+.55*float(7-L)/7.;",
      "float tw=.7+.3*sin(time*(1.2+h2*2.5)+hh*32.);",
      // Temperature → color
      "float ct=h3;vec3 sc;",
      "if(ct<.12)sc=mix(vec3(1.,.72,.35),vec3(1.,.88,.65),ct/.12);",
      "else if(ct<.28)sc=mix(vec3(1.,.88,.65),vec3(.95,.95,.98),(ct-.12)/.16);",
      "else if(ct<.6)sc=vec3(.95,.95,.98);",
      "else if(ct<.82)sc=mix(vec3(.95,.95,.98),vec3(.65,.75,1.),(ct-.6)/.22);",
      "else sc=mix(vec3(.65,.75,1.),vec3(.45,.55,.9),(ct-.82)/.18);",
      // Star profile — varied sizes
      "float d=length(lo);float st=1.-smoothstep(0.,.5,d*(4.5+float(L)*1.3));st=pow(st,3.5);",
      "col+=sc*st*br*tw*2.8;}}",
  "return col;}",

// ============================================================
// CONSTELLATIONS — four star patterns at screen corners
// ============================================================
"float segDist(vec2 p,vec2 a,vec2 b){vec2 pa=p-a,ba=b-a;float h=clamp(dot(pa,ba)/dot(ba,ba),0.,1.);return length(pa-ba*h);}",
"vec3 renderConstellations(vec2 uv,float time){vec3 col=vec3(0);float s=1.+.1*sin(time*.6);vec3 w=vec3(.85);vec3 lc=vec3(.5);float ls=.0000015;",
  // === 狮子座 Leo (左上 Home) — 实测9点坐标, scale 0.00019 ===
  // 1原点(0,0) 2(191,138) 3(85,263) 4核心(469,516) 5(396,613) 6(459,804) 7(576,804) 8(618,508) 9尾(741,384)
  "vec2 L[9];L[0]=vec2(.120,.690);L[1]=vec2(.156,.716);L[2]=vec2(.136,.740);L[3]=vec2(.209,.788);L[4]=vec2(.195,.806);L[5]=vec2(.207,.843);L[6]=vec2(.229,.843);L[7]=vec2(.237,.787);L[8]=vec2(.261,.763);",
  "for(int i=0;i<9;i++){float d=length(uv-L[i]);float br=(i==3)?1.8:1.;col+=w*(exp(-d*d/.00008)*br+exp(-d*d/.0004)*.1)*s;}",
  // 镰刀 Sickle: L[2]→L[3]→L[4]→L[5]→L[6]
  "col+=lc*exp(-segDist(uv,L[2],L[3])*segDist(uv,L[2],L[3])/ls)*.45;col+=lc*exp(-segDist(uv,L[3],L[4])*segDist(uv,L[3],L[4])/ls)*.45;",
  "col+=lc*exp(-segDist(uv,L[4],L[5])*segDist(uv,L[4],L[5])/ls)*.45;col+=lc*exp(-segDist(uv,L[5],L[6])*segDist(uv,L[5],L[6])/ls)*.45;",
  // 躯干 Body: L[3]→L[7]→L[8]
  "col+=lc*exp(-segDist(uv,L[3],L[7])*segDist(uv,L[3],L[7])/ls)*.4;col+=lc*exp(-segDist(uv,L[7],L[8])*segDist(uv,L[7],L[8])/ls)*.4;",
  // 底部连接 Bottom: L[0]→L[2], L[0]→L[1], L[1]→L[8]
  "col+=lc*exp(-segDist(uv,L[0],L[2])*segDist(uv,L[0],L[2])/ls)*.35;col+=lc*exp(-segDist(uv,L[0],L[1])*segDist(uv,L[0],L[1])/ls)*.3;",
  "col+=lc*exp(-segDist(uv,L[1],L[8])*segDist(uv,L[1],L[8])/ls)*.35;",
  // === 猎户座 Orion (右上 Projects) — 实测17点, scale 0.00020 ===
  "vec2 O[17];O[0]=vec2(.720,.675);O[1]=vec2(.730,.720);O[2]=vec2(.741,.723);O[3]=vec2(.748,.730);O[4]=vec2(.762,.716);O[5]=vec2(.778,.683);O[6]=vec2(.760,.771);O[7]=vec2(.742,.792);O[8]=vec2(.705,.777);O[9]=vec2(.693,.791);O[10]=vec2(.676,.820);O[11]=vec2(.695,.856);O[12]=vec2(.823,.774);O[13]=vec2(.822,.788);O[14]=vec2(.822,.766);O[15]=vec2(.818,.749);O[16]=vec2(.806,.741);",
  "for(int i=0;i<17;i++){float d=length(uv-O[i]);float br=(i==0||i==5||i==8||i==12||(i>=1&&i<=3))?1.5:1.;col+=w*(exp(-d*d/.00008)*br+exp(-d*d/.0004)*.1)*s;}",
  // 肩线 Shoulders via chest: O[8]→O[6]→O[7]
  "col+=lc*exp(-segDist(uv,O[8],O[6])*segDist(uv,O[8],O[6])/ls)*.4;col+=lc*exp(-segDist(uv,O[6],O[7])*segDist(uv,O[6],O[7])/ls)*.4;",
  // 左躯干 Left body: O[8]→O[0]
  "col+=lc*exp(-segDist(uv,O[8],O[0])*segDist(uv,O[8],O[0])/ls)*.35;",
  // 右躯干 Right body: O[6]→O[4]→O[5], 底座 O[0]→O[5]
  "col+=lc*exp(-segDist(uv,O[6],O[4])*segDist(uv,O[6],O[4])/ls)*.3;col+=lc*exp(-segDist(uv,O[4],O[5])*segDist(uv,O[4],O[5])/ls)*.3;",
  "col+=lc*exp(-segDist(uv,O[0],O[5])*segDist(uv,O[0],O[5])/ls)*.25;",
  // 腰带 Belt: O[1]→O[2]→O[3]
  "col+=lc*exp(-segDist(uv,O[1],O[2])*segDist(uv,O[1],O[2])/ls)*.5;col+=lc*exp(-segDist(uv,O[2],O[3])*segDist(uv,O[2],O[3])/ls)*.5;",
  // 腰带接胸 Belt→Chest: O[2]→O[6]
  "col+=lc*exp(-segDist(uv,O[2],O[6])*segDist(uv,O[2],O[6])/ls)*.35;",
  // 左臂 Left arm: O[8]→O[9]→O[10]→O[11]
  "col+=lc*exp(-segDist(uv,O[8],O[9])*segDist(uv,O[8],O[9])/ls)*.35;col+=lc*exp(-segDist(uv,O[9],O[10])*segDist(uv,O[9],O[10])/ls)*.35;",
  "col+=lc*exp(-segDist(uv,O[10],O[11])*segDist(uv,O[10],O[11])/ls)*.35;",
  // 右臂 Right arm: O[6]→O[12]→O[13], O[12]→O[14]→O[15]→O[16]
  "col+=lc*exp(-segDist(uv,O[6],O[12])*segDist(uv,O[6],O[12])/ls)*.3;col+=lc*exp(-segDist(uv,O[12],O[13])*segDist(uv,O[12],O[13])/ls)*.3;",
  "col+=lc*exp(-segDist(uv,O[12],O[14])*segDist(uv,O[12],O[14])/ls)*.3;col+=lc*exp(-segDist(uv,O[14],O[15])*segDist(uv,O[14],O[15])/ls)*.3;",
  "col+=lc*exp(-segDist(uv,O[15],O[16])*segDist(uv,O[15],O[16])/ls)*.3;",
  // === 天琴座 Lyra (左下 Blog) — 实测5点, scale 0.00018 ===
  // 1底星(0,0) 2右(234,165) 3左(-181,489) 4顶(49,666) 5织女星(174,877)
  "vec2 Y[5];Y[0]=vec2(.140,.120);Y[1]=vec2(.182,.150);Y[2]=vec2(.107,.208);Y[3]=vec2(.149,.240);Y[4]=vec2(.171,.278);",
  "for(int i=0;i<5;i++){float d=length(uv-Y[i]);float br=(i==0||i==4)?1.8:1.;col+=w*(exp(-d*d/.00008)*br+exp(-d*d/.0004)*.1)*s;}",
  // 平行四边形 Parallelogram: Y[0]→Y[1]→Y[3]→Y[2]→Y[0]
  "col+=lc*exp(-segDist(uv,Y[0],Y[1])*segDist(uv,Y[0],Y[1])/ls)*.4;col+=lc*exp(-segDist(uv,Y[1],Y[3])*segDist(uv,Y[1],Y[3])/ls)*.4;",
  "col+=lc*exp(-segDist(uv,Y[3],Y[2])*segDist(uv,Y[3],Y[2])/ls)*.4;col+=lc*exp(-segDist(uv,Y[2],Y[0])*segDist(uv,Y[2],Y[0])/ls)*.4;",
  // 织女星连接 Vega: Y[4]→Y[3], Y[4]→Y[2], Y[4]→Y[0]
  "col+=lc*exp(-segDist(uv,Y[4],Y[3])*segDist(uv,Y[4],Y[3])/ls)*.45;col+=lc*exp(-segDist(uv,Y[4],Y[2])*segDist(uv,Y[4],Y[2])/ls)*.4;",
  "col+=lc*exp(-segDist(uv,Y[4],Y[0])*segDist(uv,Y[4],Y[0])/ls)*.3;",
  // === 天鹅座 Cygnus (右下 Contact) — 实测9点, scale 0.00018 ===
  // 1底(0,0) 2(-306,227) 3中心(-541,358) 4(-683,482) 5(-312,541) 6(-661,131) 7(-891,5) 8(-261,718) 9顶(-184,763)
  "vec2 C[9];C[0]=vec2(.880,.120);C[1]=vec2(.825,.161);C[2]=vec2(.783,.184);C[3]=vec2(.757,.207);C[4]=vec2(.824,.217);C[5]=vec2(.761,.144);C[6]=vec2(.720,.121);C[7]=vec2(.833,.249);C[8]=vec2(.847,.257);",
  "for(int i=0;i<9;i++){float d=length(uv-C[i]);float br=(i==0||i==2||i==8)?1.6:1.;col+=w*(exp(-d*d/.00008)*br+exp(-d*d/.0004)*.1)*s;}",
  // 竖轴 Vertical: C[8](Deneb)→C[7]→C[2]→C[1]→C[0]
  "col+=lc*exp(-segDist(uv,C[8],C[7])*segDist(uv,C[8],C[7])/ls)*.45;col+=lc*exp(-segDist(uv,C[7],C[2])*segDist(uv,C[7],C[2])/ls)*.4;",
  "col+=lc*exp(-segDist(uv,C[2],C[1])*segDist(uv,C[2],C[1])/ls)*.4;col+=lc*exp(-segDist(uv,C[1],C[0])*segDist(uv,C[1],C[0])/ls)*.4;",
  // 左翼 Left wing: C[2]→C[5]→C[6]
  "col+=lc*exp(-segDist(uv,C[2],C[5])*segDist(uv,C[2],C[5])/ls)*.4;col+=lc*exp(-segDist(uv,C[5],C[6])*segDist(uv,C[5],C[6])/ls)*.4;",
  // 右翼 Right wing: C[2]→C[4]→C[3]
  "col+=lc*exp(-segDist(uv,C[2],C[4])*segDist(uv,C[2],C[4])/ls)*.4;col+=lc*exp(-segDist(uv,C[4],C[3])*segDist(uv,C[4],C[3])/ls)*.4;",
  "return col;}",

// ============================================================
// GRAVITATIONAL LENSING — deflection + shadow
// ============================================================
"vec2 lensDeflect(vec2 px,vec2 bh,float r){",
  "vec2 d=px-bh;float di=length(d);",
  "if(r<.5)return vec2(0.,1.);",
  "if(di<r)return vec2(0.,0.);",
  // Soft shadow from event horizon
  "float shadow=smoothstep(r*.35,r*3.2,di);",
  // Gravitational deflection ~ 1/d (Schwarzschild weak-field approx)
  "float deflect=0.;",
  "if(di>r*1.003){float beyond=max(di-r*.997,r*.003);deflect=(r*r*14.)/beyond;deflect=min(deflect,di-r*1.001);deflect=max(deflect,0.);}",
  "return vec2(deflect,shadow);}",

// ============================================================
// EVENT HORIZON — pure dark sphere, no ring
// ============================================================
"vec3 renderEventHorizon(vec2 px,vec2 bh,float r){",
  "vec2 d=px-bh;float di=length(d);vec3 col=vec3(0);",
  "if(r<.5)return col;",
  // Dark void — pure absorption
  "if(di<r){float nz2=1.-(di*di)/(r*r);float nz=sqrt(max(nz2,0.));",
    "float darkness=.01+.05*nz;col+=vec3(.001,.002,.008)*darkness;}",
  // Ultra-subtle soft atmosphere — barely visible
  "if(di>r&&di<r*2.){float nd=(di-r)/r;float at=exp(-nd*nd/.1)*.025;col+=vec3(.04,.08,.2)*at;}",
  "return col;}",

// ============================================================
// ACCRETION DISK — multi-layer plasma with turbulence
// ============================================================
"vec3 renderDisk(vec2 px,vec2 bh,float r,float time,vec2 mouse,float lensBoost){",
  "vec2 d=px-bh;float di=length(d);vec3 col=vec3(0);",
  "if(r<.5)return col;",
  // Disk geometry — tilted, un-tilt to circular
  "float tilt=.3;float sx=d.x,sy=d.y/cos(tilt);",
  "float dd=sqrt(sx*sx+sy*sy);float diDisk=r*2.2,duDisk=r*6.5;",
  "float ang=atan(sy,sx);",
  // === Disk color and density functions ===
  // Radial temperature gradient
  "float diskT=(dd-diDisk)/(duDisk-diDisk);",
  // Procedural turbulence — flowing gas
  "float turb=noise(vec2(ang*8.,diskT*12.+time*.15))*noise(vec2(ang*15.+2.,diskT*8.-time*.1));",
  "turb+=.5*noise(vec2(ang*3.-time*.2,diskT*5.));",
  // Spiral motion
  "float spiral=sin(ang*3.+diskT*10.-time*.25)*.5+.5;",
  // Hot spots
  "float hotspot=pow(noise(vec2(ang*20.,diskT*15.+time*.3)),4.)*.6;",
  // Density variations
  "float density=.7+.3*(turb*.6+spiral*.3+hotspot*.1);",
  // === Doppler — CG-stylized dramatic asymmetry ===
  "float beamAngle=ang+time*.35;",
  "float doppler=pow(max(cos(beamAngle)*.5+.5,.02),3.5);",
  "float dopplerAsym=.05+.95*doppler;",
  // === Color gradient: white → yellow → orange → red → brown ===
  "vec3 diskC;",
  "if(diskT<.06)diskC=mix(vec3(1.2,1.1,.95),vec3(1.,.9,.55),diskT/.06);",
  "else if(diskT<.2)diskC=mix(vec3(1.,.9,.55),vec3(1.,.55,.12),(diskT-.06)/.14);",
  "else if(diskT<.5)diskC=mix(vec3(1.,.55,.12),vec3(.55,.35,.15),(diskT-.2)/.3);",
  "else diskC=mix(vec3(.55,.35,.15),vec3(.35,.25,.18),(diskT-.5)/.5);",
  // === THREE-ZONE DISK MASKS (angular-based, not d.y) ===
  // Lower (direct): centered at ang=-π/2 (bottom of screen)
  "float la=abs(ang+PI*.5);float lowerMask=1.-smoothstep(PI*.38,PI*.52,la);",
  // Upper (lensed): centered at ang=π/2 (top of screen)
  "float ua=abs(ang-PI*.5);float upperMask=1.-smoothstep(PI*.38,PI*.52,ua);",
  // Middle bridge: d.y distance, thick near BH, tapers outward
  "float eqDist=abs(d.y)/max(r,.01);",
  "float midW=clamp(.6+1.9*(1.-dd/(duDisk*1.65)),.6,2.5);",
  "float midMask=exp(-eqDist*eqDist/midW);",
  // === LOWER DISK (directly visible, angular zone) ===
  "if(dd>diDisk&&dd<duDisk&&lowerMask>.001){",
    "float rad=exp(-diskT*0.3)*1.8;",
    "float ef=smoothstep(diDisk,diDisk+r*.3,dd)*(1.-smoothstep(duDisk-r*3.5,duDisk,dd));",
    "col+=diskC*rad*dopplerAsym*ef*lowerMask*density*1.4;}",
  // === UPPER DISK (same radial as lower, just angular zone) ===
  "if(dd>diDisk&&dd<duDisk&&upperMask>.001){",
    "float rad=exp(-diskT*0.3)*1.8;",
    "float ef=smoothstep(diDisk,diDisk+r*.3,dd)*(1.-smoothstep(duDisk-r*3.5,duDisk,dd));",
    "col+=diskC*rad*dopplerAsym*ef*upperMask*density*1.4;}",
  // === MIDDLE BRIDGE (equatorial glow, bridges upper/lower) ===
  "if(dd>diDisk&&dd<duDisk*1.65&&midMask>.001){",
    "float bEf=smoothstep(diDisk,diDisk+r*.3,dd)*(1.-smoothstep(duDisk*1.2,duDisk*1.65,dd));",
    "float bDir=d.x>0.?1.:-1.;float bTravel=fract(dd/duDisk*1.2-time*.2*bDir);float bHot=exp(-pow(bTravel*10.-5.,2.));",
    "float bFlow=1.+.35*bHot;",
    "vec3 bCol=mix(vec3(.55,.35,.12),vec3(1.,.88,.6),smoothstep(diDisk,duDisk*.8,dd));",
    "col+=bCol*1.4*bEf*midMask*bFlow*(.6+.4*dopplerAsym);}",
  "return col;}",

// ============================================================
// GRAVITATIONAL LENSING — apply to texture/starfield coordinates
// ============================================================
"vec2 renderLens(vec2 uv,vec2 px,vec2 bh,float r,float lensStrength){",
  "float di=length(px-bh);vec2 ld=lensDeflect(px,bh,r);float deflect=ld.x;",
  "vec2 luv=uv;",
  "if(deflect>.1&&r>.5){vec2 tw=normalize(bh-px);luv+=tw*deflect*lensStrength/uRes;}",
  "return luv;}",

// ============================================================
// TONE MAPPING — ACES approximation
// ============================================================
"vec3 toneMapping(vec3 col){",
  // Relaxed ACES — preserves more brightness for cinematic look
  "float a=2.2;float b=.02;float c=2.1;float d=.5;float e=.12;",
  "return clamp((col*(a*col+b))/(col*(c*col+d)+e),0.,1.);}",

// ============================================================
// POST PROCESSING — bloom, CA, film grain, vignette
// ============================================================
"vec3 postProcess(vec3 col,vec2 uv,float time){",
  // Chromatic aberration — very subtle, radial
  "float ca=.0015;float rad=length(uv-.5);",
  "float r=ca*rad;col.r=col.r*(1.-r)+col.g*r*.5;col.b=col.b*(1.-r)+col.g*r*.5;",
  // Film grain — temporal high-frequency noise
  "float grain=(h23(uv*vec2(1234.,5678.)+time*100.)-.5)*.025;",
  "col+=grain;",
  // Soft vignette — lighter for cinematic look
  "float vig=1.-dot(uv-.5,uv-.5)*.22;col*=vig;",
  "return col;}",

// ============================================================
// MAIN
// ============================================================
"void main(){",
  "vec2 uv=vUv;vec2 px=uv*uRes;vec2 bh=uBH;",
  "float r=uRadius;float time=uTime;vec2 mouse=uMouse;",

  // Camera breathing zoom
  "float breath=1.+.003*sin(time*.4)*.5+.002*cos(time*.7)*.5;",
  "r*=breath;",

  // Gravitational lensing
  "vec2 ld=lensDeflect(px,bh,r);float deflect=ld.x,shadow=ld.y;",

  // Mouse influences lensing intensity and disk turbulence
  "float lensBoost=.8+.4*mouse.x;",
  "vec2 luv=renderLens(uv,px,bh,r,lensBoost);",

  // Blend unlensed → lensed background
  "float distBH=length(px-bh);float infR=r*12.;",
  "float blendLens=0.;if(infR>.5)blendLens=1.-smoothstep(infR*.02,infR*.8,distBH);",

  // Render background + stars (unlensed & lensed)
  "vec3 bg=renderBackground(uv);vec3 bgL=renderBackground(luv);",
  "vec3 stars=renderStars(uv,time);vec3 starsL=renderStars(luv,time);",
  "float lensMag=1.+.6*(1.-smoothstep(r*2.,r*8.,distBH));",
  "vec3 color=mix(bg+stars,bgL+starsL*lensMag,blendLens);",

  // Gravitational shadow
  "color*=.02+.98*shadow;",

  // Constellations (corner star patterns, lensed by BH gravity)
  "color+=renderConstellations(luv,time);",

  // Render black hole components
  "color+=renderEventHorizon(px,bh,r);",
  "color+=renderDisk(px,bh,r,time,mouse,lensBoost);",

  // Text overlay with lensing
  "vec2 tuv=renderLens(uv,px,bh,r,lensBoost);tuv.y-=.08;",
  "vec4 ts=texture(uTex,tuv);color=mix(color,ts.rgb*1.1,ts.a);",

  // Tone mapping + post processing
  "color=toneMapping(color);",
  "color=postProcess(color,uv,time);",

  "gl_FragColor=vec4(color,1.);}"
].join("\n");

// ===== CREATE SHADER =====
var M=new THREE.ShaderMaterial({uniforms:U,vertexShader:VS,fragmentShader:FS});
S.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2),M));

// ===== STATE =====
var TR=Math.min(innerWidth,innerHeight)*.035;
var bhTarget={x:innerWidth*.5,y:innerHeight*.45};
var bh={x:innerWidth*.5,y:innerHeight*.45,radius:0,animStart:performance.now(),animDur:3200};
var mouse={x:innerWidth*.5,y:innerHeight*.45},mouseOn=false;
var camDrift={x:0,y:0,zoom:0};

c.addEventListener('pointermove',function(e){var r=c.getBoundingClientRect();
  mouse.x=e.clientX-r.left;
  mouse.y=e.clientY-r.top;
  mouseOn=true;});
c.addEventListener('pointerleave',function(){mouseOn=false;});

window.addEventListener('keydown',function(e){if(e.key.toLowerCase()==='r'){e.preventDefault();
  bhTarget.x=innerWidth*.5;bhTarget.y=innerHeight*.45;}});

window.addEventListener('resize',function(){R.setSize(innerWidth,innerHeight);
  RE.set(innerWidth,innerHeight);U.uRes.value.set(innerWidth,innerHeight);});

// ===== ANIMATION =====
var clock=new THREE.Clock(),first=true;
function A(ts){requestAnimationFrame(A);
  var dt=Math.min(clock.getDelta(),.1);U.uTime.value+=dt;

  // Entry animation
  var el=ts-bh.animStart,at=Math.min(el/bh.animDur,1.),ea=1.-Math.pow(1.-at,3.);
  bh.radius=TR*ea;

  // BH movement: mouse priority, else patrol to random waypoints
  var dx=mouse.x-bh.x,dy=mouse.y-bh.y,distToMouse=Math.sqrt(dx*dx+dy*dy);
  var attractRange=Math.min(innerWidth,innerHeight)*.45;
  // Generate new waypoint when BH reaches current one (or every 5-8s)
  var distToTarget=Math.sqrt((bh.x-camDrift.x)*(bh.x-camDrift.x)+(bh.y-camDrift.y)*(bh.y-camDrift.y));
  camDrift.zoom-=dt;
  if(camDrift.zoom<=0||distToTarget<60){
    camDrift.zoom=5.+Math.random()*3.;
    camDrift.x=80+Math.random()*(innerWidth-160);
    camDrift.y=80+Math.random()*(innerHeight-160);
  }
  bhTarget.x=camDrift.x;
  bhTarget.y=camDrift.y;
  if(mouseOn&&distToMouse<attractRange){
    // Mouse nearby → override with attraction
    var pull=0.4+1.2*(1.-distToMouse/attractRange);
    bhTarget.x=bh.x+dx*pull;
    bhTarget.y=bh.y+dy*pull;
  }
  // Move toward target at constant speed (no accel/decel)
  var tx=bhTarget.x-bh.x,ty=bhTarget.y-bh.y,td=Math.sqrt(tx*tx+ty*ty);
  var speed=mouseOn&&distToMouse<attractRange?120:50;
  if(td>1.){var step=Math.min(speed*dt,td);bh.x+=tx/td*step;bh.y+=ty/td*step;}
  bh.x=Math.min(innerWidth-5,Math.max(5,bh.x));
  bh.y=Math.min(innerHeight-5,Math.max(5,bh.y));

  // Update uniforms
  U.uBH.value.set(bh.x,RE.y-bh.y);
  U.uRadius.value=bh.radius;
  U.uMouse.value.set(mouse.x/innerWidth,mouse.y);
  U.uZoom.value=camDrift.zoom;

  R.render(S,K);
  if(first){first=false;var er=gl.getError();
    h.textContent=er!==gl.NO_ERROR?'⚠ GL err 0x'+er.toString(16):'made by gch / 残留v枫楪';}
}
requestAnimationFrame(A);
})();
</script>
